<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Logo SkySense — 4 triángulos formando un diamante con esquinas redondeadas -->
  <g fill="#0033A0" stroke="#0033A0" stroke-width="14" stroke-linejoin="round">
    <!-- Triángulo SUPERIOR (apex en N, base horizontal hacia el centro) -->
    <polygon points="100,24 158,74 42,74" />
    <!-- Triángulo DERECHO (apex en E, base vertical hacia el centro) -->
    <polygon points="176,100 126,158 126,42" />
    <!-- Triángulo INFERIOR (apex en S) -->
    <polygon points="100,176 42,126 158,126" />
    <!-- Triángulo IZQUIERDO (apex en W) -->
    <polygon points="24,100 74,42 74,158" />
  </g>
</svg>
