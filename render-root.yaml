# ⚠️  Este archivo va en la RAÍZ del repositorio, NO dentro de skypv-app/
# Úsalo si tu repo tiene la estructura:
#   tu-repo/
#   ├── skypv-app/
#   │   ├── backend/
#   │   └── frontend/
#   └── render-root.yaml  ← renómbralo a render.yaml al moverlo
#
# Si prefieres tener backend/ y frontend/ en la raíz, usa skypv-app/render.yaml
# y mueve esas carpetas a la raíz del repo.

services:
  # ─── Backend Flask ───
  - type: web
    name: skypv-api
    runtime: python
    plan: free
    rootDir: skypv-app/backend          # ← clave: ruta relativa desde la raíz del repo
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: FLASK_APP
        value: wsgi.py
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: skypv-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://skypv-web.onrender.com
      - key: ADMIN_EMAIL
        value: admin@skyenergy.mx
      - key: ADMIN_PASSWORD
        sync: false                     # configurar manualmente en el dashboard
      - key: ADMIN_NAME
        value: Administrador SKY

  # ─── Frontend estático ───
  - type: web
    name: skypv-web
    runtime: static
    rootDir: skypv-app/frontend         # ← idem
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://skypv-api.onrender.com/api/:splat
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://skypv-api.onrender.com/api

databases:
  - name: skypv-db
    plan: free
    databaseName: skypv
    user: skypv
