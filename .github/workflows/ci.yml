name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend lint + syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        working-directory: backend
        run: |
          pip install -r requirements.txt
      - name: Syntax check
        working-directory: backend
        run: python -m compileall -q app wsgi.py config.py
      - name: Smoke test (SQLite)
        working-directory: backend
        env:
          DATABASE_URL: sqlite:///test.db
          SECRET_KEY: test
          JWT_SECRET_KEY: test
        run: |
          flask init-db
          flask seed-all
          python -c "from app import create_app; app=create_app(); print(app.url_map)"

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        working-directory: frontend
        run: npm install
      - name: Build
        working-directory: frontend
        env:
          VITE_API_URL: /api
        run: npm run build
